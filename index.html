<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qureshi AI Signals V2.0</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="container">

<h1>🤖 Qureshi AI Signals</h1>

<div class="card">

<h3>Market Type</h3>

<select id="marketType">

<option value="LIVE">LIVE MARKET</option>

<option value="OTC">OTC MARKET</option>

</select>

<h3>Select Pair</h3>

<select id="pair">

<option>EUR/USD</option>

<option>GBP/USD</option>

<option>USD/JPY</option>

</select>

<h3>Expiry Time</h3>

<select id="time">

<option>1 Minute</option>

<option>5 Minutes</option>

<option>10 Minutes</option>

<option>15 Minutes</option>

</select>

<button onclick="startAI()">

ANALYZE MARKET

</button>

</div>

<div class="resultCard">

<h2 id="signal">WAIT ⏳</h2>

<h3 id="confidence">Confidence : 0%</h3>

<h3 id="pairName">Pair : -</h3>

<h3 id="trend">Trend : -</h3>

<h3 id="reason">Reason : -</h3>

</div>

<div class="indicatorCard">

<h2>Indicators</h2>

<p id="ema">EMA : -</p>

<p id="rsi">RSI : -</p>

<p id="macd">MACD : -</p>

<p id="bollinger">Bollinger : -</p>

<p id="stochastic">Stochastic : -</p>

<p id="cci">CCI : -</p>

<p id="candlestick">Candlestick : -</p>

</div>

</div>

<script src="config.js"></script>

<script src="market.js"></script>

<script src="datafeed.js"></script>

<script src="pairs.js"></script>

<script src="indicators.js"></script>

<script src="score.js"></script>

<script src="rules.js"></script>

<script src="strategy.js"></script>

<script src="ai.js"></script>

<script src="signals.js"></script>

<script src="history.js"></script>

<script src="dashboard.js"></script>

<script src="engine.js"></script>

<script src="main.js"></script>

</body>

</html>
